<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loteria Federal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 class="header__title">
          Escolha a <span class="header__highlight">loteria</span> para apostar
        </h1>
      </header>

      <nav class="games" aria-label="Jogos disponíveis">
        <button class="game-btn game-btn--mega" type="button" data-game="mega-sena">
          <span class="game-btn__name">Mega-Sena</span>
          <span class="game-btn__hint">6 números de 1 a 60</span>
        </button>

        <button class="game-btn game-btn--quina" type="button" data-game="quina">
          <span class="game-btn__name">Quina</span>
          <span class="game-btn__hint">5 números de 1 a 80</span>
        </button>

        <button class="game-btn game-btn--lotofacil" type="button" data-game="lotofacil">
          <span class="game-btn__name">Lotofácil</span>
          <span class="game-btn__hint">15 números de 1 a 25</span>
        </button>
      </nav>

      <a class="verify-btn" href="verificar.html">Verificar Jogos</a>
    </main>

    <script src="script.js"></script>
  </body>
</html>
